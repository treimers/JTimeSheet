name: Build and Release JTimeSheet

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            target/deploy/linux/**

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        shell: bash
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            target/deploy/windows/**

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            target/deploy/osx-arm64/**
            target/deploy/osx/**

  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            target/deploy/osx-x86_64/**
            target/deploy/osx/**

  create-release:
    needs: [build-linux, build-windows, build-macos-arm64, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Rename artifacts for unique asset names
        run: |
          mkdir -p ./artifacts/release
          # Only copy known distributable formats with JTimeSheet in the name
          for os in linux windows macos-arm64 macos-intel; do
            [ ! -d "./artifacts/$os" ] && continue
            for ext in zip dmg pkg exe deb rpm msi; do
              find ./artifacts/$os -type f -name "*.$ext" -path "*JTimeSheet*" | while read -r f; do
                filename=$(basename "$f")
                name="${filename%.*}"
                cp "$f" "./artifacts/release/${name}-${os}.${ext}"
              done
            done
          done

      - name: Create GitHub Release with gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_files=()
          for f in ./artifacts/release/*; do
            [ -f "$f" ] && [[ "$(basename "$f")" == *JTimeSheet* ]] && release_files+=( "$f" )
          done
          if [ ${#release_files[@]} -eq 0 ]; then
            echo "No release artifacts found in ./artifacts/release/"
            exit 1
          fi
          echo "Uploading ${#release_files[@]} asset(s): ${release_files[*]}"
          gh release create "v${{ env.VERSION }}" "${release_files[@]}" \
            --title "Release v${{ env.VERSION }}" \
            --draft=false \
            --repo treimers/JTimeSheet
