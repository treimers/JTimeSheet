name: Build and Release JTimeSheet

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Check if version differs from latest release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag-Push und workflow_dispatch: immer bauen
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Tag push, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Push auf Branch: nur bauen wenn pom-Version vom letzten Release abweicht
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          RELEASE_VERSION="${LATEST_TAG#v}"
          if [ "$POM_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version changed: $RELEASE_VERSION -> $POM_VERSION, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($POM_VERSION), skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            target/deploy/linux/**

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        shell: bash
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            target/deploy/windows/**

  build-macos-arm64:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            target/deploy/osx-arm64/**
            target/deploy/osx/**

  build-macos-intel:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            target/deploy/osx-x86_64/**
            target/deploy/osx/**

  create-release:
    needs: [check-version, build-linux, build-windows, build-macos-arm64, build-macos-intel]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Debug – Artefakt-Struktur
        run: |
          echo "=== Workspace: ${{ github.workspace }} ==="
          echo "=== PWD: $(pwd) ==="
          echo ""
          ls -Rla ./artifacts 2>/dev/null || echo "Nicht gefunden"

      - name: Copy release artifacts (whitelist only)
        run: |
          ARTIFACTS="${{ github.workspace }}/artifacts"
          RELEASE="${ARTIFACTS}/release"
          mkdir -p "$RELEASE"
          VERSION="${{ env.VERSION }}"
          cp_if() { if [ -f "$1" ]; then cp "$1" "$RELEASE/$2"; fi; }
          cp_if_first() { dest="$1"; shift; for src in "$@"; do [ -f "$src" ] && cp "$src" "$RELEASE/$dest" && break; done; }
          # Linux: artifacts/linux/
          cp_if "${ARTIFACTS}/linux/JTimeSheet-${VERSION}-linux.zip" "JTimeSheet-${VERSION}-linux-x64.zip"
          cp_if "${ARTIFACTS}/linux/JTimeSheet_${VERSION}.deb" "JTimeSheet_${VERSION}-linux-x64.deb"
          cp_if "${ARTIFACTS}/linux/JTimeSheet_${VERSION}.rpm" "JTimeSheet_${VERSION}-linux-x64.rpm"
          # macOS ARM64: osx/ oder osx/assets/
          cp_if "${ARTIFACTS}/macos-arm64/osx/JTimeSheet-${VERSION}-mac.zip" "JTimeSheet-${VERSION}-macos-arm64.zip"
          cp_if_first "JTimeSheet_${VERSION}-macos-arm64.dmg" "${ARTIFACTS}/macos-arm64/osx/JTimeSheet_${VERSION}.dmg" "${ARTIFACTS}/macos-arm64/osx/assets/JTimeSheet_${VERSION}.dmg"
          cp_if_first "JTimeSheet_${VERSION}-macos-arm64.pkg" "${ARTIFACTS}/macos-arm64/osx/JTimeSheet_${VERSION}.pkg" "${ARTIFACTS}/macos-arm64/osx/assets/JTimeSheet_${VERSION}.pkg"
          # macOS Intel: osx/ oder osx/assets/
          cp_if "${ARTIFACTS}/macos-intel/osx/JTimeSheet-${VERSION}-mac.zip" "JTimeSheet-${VERSION}-macos-x64.zip"
          cp_if_first "JTimeSheet_${VERSION}-macos-x64.dmg" "${ARTIFACTS}/macos-intel/osx/JTimeSheet_${VERSION}.dmg" "${ARTIFACTS}/macos-intel/osx/assets/JTimeSheet_${VERSION}.dmg"
          cp_if_first "JTimeSheet_${VERSION}-macos-x64.pkg" "${ARTIFACTS}/macos-intel/osx/JTimeSheet_${VERSION}.pkg" "${ARTIFACTS}/macos-intel/osx/assets/JTimeSheet_${VERSION}.pkg"
          # Windows: artifacts/windows/
          cp_if "${ARTIFACTS}/windows/JTimeSheet-${VERSION}-windows.zip" "JTimeSheet-${VERSION}-windows-x64.zip"
          cp_if "${ARTIFACTS}/windows/JTimeSheet_${VERSION}.exe" "JTimeSheet_${VERSION}-windows-x64.exe"
          cp_if "${ARTIFACTS}/windows/JTimeSheet_${VERSION}.msi" "JTimeSheet_${VERSION}-windows-x64.msi"

      - name: Create GitHub Release with gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_DIR=./artifacts/release
          VERSION="${{ env.VERSION }}"
          # Explizite Reihenfolge, fehlende Dateien werden übersprungen (kein Abbruch)
          release_assets=()
          add_if_exists() { if [ -f "$1" ]; then release_assets+=( "$1" ); fi; }
          add_if_exists "$RELEASE_DIR/JTimeSheet-${VERSION}-linux-x64.zip"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-linux-x64.deb"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-linux-x64.rpm"
          add_if_exists "$RELEASE_DIR/JTimeSheet-${VERSION}-macos-arm64.zip"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-macos-arm64.dmg"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-macos-arm64.pkg"
          add_if_exists "$RELEASE_DIR/JTimeSheet-${VERSION}-macos-x64.zip"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-macos-x64.dmg"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-macos-x64.pkg"
          add_if_exists "$RELEASE_DIR/JTimeSheet-${VERSION}-windows-x64.zip"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-windows-x64.exe"
          add_if_exists "$RELEASE_DIR/JTimeSheet_${VERSION}-windows-x64.msi"
          if [ ${#release_assets[@]} -eq 0 ]; then
            echo "No release artifacts found in $RELEASE_DIR/"
            exit 1
          fi
          echo "Uploading ${#release_assets[@]} asset(s) in order: Linux → macOS ARM64 → macOS Intel → Windows"
          cat << 'NOTES' | sed 's/^          //' > release-notes.md
          ## Downloads

          ### Linux
          - **ZIP** – portable archive
          - **DEB** – Debian/Ubuntu
          - **RPM** – Fedora/RHEL

          ### macOS ARM64 (Apple Silicon)
          - **ZIP** – portable archive
          - **PKG** – installer

          ### macOS Intel
          - **ZIP** – portable archive
          - **DMG** – disk image
          - **PKG** – installer

          ### Windows
          - **ZIP** – portable archive
          - **MSI** – installer

          ### Source code
          Automatically generated archives are available below.
          NOTES
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="v${VERSION}"
          fi
          gh release create "${RELEASE_TAG}" "${release_assets[@]}" \
            --title "Release ${RELEASE_TAG}" \
            -F release-notes.md \
            --draft=false \
            --repo treimers/JTimeSheet
