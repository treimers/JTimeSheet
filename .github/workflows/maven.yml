name: Build and Release JTimeSheet

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Check if version differs from latest release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag-Push und workflow_dispatch: immer bauen
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Tag push, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Push auf Branch: nur bauen wenn pom-Version vom letzten Release abweicht
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          RELEASE_VERSION="${LATEST_TAG#v}"
          if [ "$POM_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version changed: $RELEASE_VERSION -> $POM_VERSION, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($POM_VERSION), skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            target/deploy/linux/**

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Extract version from pom.xml
        id: get_version
        shell: bash
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            target/deploy/windows/**

  build-macos-arm64:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            target/deploy/osx-arm64/**
            target/deploy/osx/**

  build-macos-intel:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            target/deploy/osx-x86_64/**
            target/deploy/osx/**

  create-release:
    needs: [check-version, build-linux, build-windows, build-macos-arm64, build-macos-intel]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Copy release artifacts (exclude JTimeSheet-windows.exe launcher only)
        run: |
          mkdir -p ./artifacts/release
          VERSION="${{ env.VERSION }}"
          # Find all distributable formats; exclude only the small launcher JTimeSheet-windows.exe
          for os in linux windows macos-arm64 macos-intel; do
            [ ! -d "./artifacts/$os" ] && continue
            find "./artifacts/$os" -type f \( -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.msi" -o -name "*.exe" \) -path "*JTimeSheet*" | while read -r f; do
              filename=$(basename "$f")
              # Exclude only the small launcher JTimeSheet-windows.exe, not JTimeSheet-<version>-windows.exe (installer)
              if [ "$filename" = "JTimeSheet-windows.exe" ]; then continue; fi
              name="${filename%.*}"
              ext="${filename##*.}"
              cp "$f" "./artifacts/release/${name}-${os}.${ext}"
            done
          done

      - name: Create GitHub Release with gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_DIR=./artifacts/release
          VERSION="${{ env.VERSION }}"
          # Build asset list in grouped order with display labels (Linux → macOS ARM64 → macOS Intel → Windows)
          # gh CLI syntax: path#Display Label
          release_assets=()
          for f in "$RELEASE_DIR"/*-linux.* "$RELEASE_DIR"/*-macos-arm64.* "$RELEASE_DIR"/*-macos-intel.* "$RELEASE_DIR"/*-windows.*; do
            if [ -f "$f" ]; then release_assets+=( "$f" ); fi
          done
          if [ ${#release_assets[@]} -eq 0 ]; then
            echo "No release artifacts found in $RELEASE_DIR/"
            exit 1
          fi
          echo "Uploading ${#release_assets[@]} asset(s) in order: Linux → macOS ARM64 → macOS Intel → Windows"
          cat << 'NOTES' | sed 's/^          //' > release-notes.md
          ## Downloads

          ### Linux
          - **ZIP** – portable archive
          - **DEB** – Debian/Ubuntu
          - **RPM** – Fedora/RHEL

          ### macOS ARM64 (Apple Silicon)
          - **ZIP** – portable archive
          - **PKG** – installer

          ### macOS Intel
          - **ZIP** – portable archive
          - **DMG** – disk image
          - **PKG** – installer

          ### Windows
          - **ZIP** – portable archive
          - **MSI** – installer

          ### Source code
          Automatically generated archives are available below.
          NOTES
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="v${VERSION}"
          fi
          gh release create "${RELEASE_TAG}" "${release_assets[@]}" \
            --title "Release ${RELEASE_TAG}" \
            -F release-notes.md \
            --draft=false \
            --repo treimers/JTimeSheet
